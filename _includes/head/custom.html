<script>
MathJax = {
  tex: {inlineMath: [['$', '$'], ['\\(', '\\)']]}
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  var containers = document.querySelectorAll(".page__content");
  var urlPattern = /https?:\/\/[^\s<]+/g;
  var skipTags = new Set(["A", "CODE", "PRE", "SCRIPT", "STYLE", "TEXTAREA"]);

  function trimUrl(match) {
    var url = match;
    var trailing = "";

    while (/[.,!?;:]+$/.test(url)) {
      trailing = url.slice(-1) + trailing;
      url = url.slice(0, -1);
    }

    while (url.endsWith(")")) {
      var opens = (url.match(/\(/g) || []).length;
      var closes = (url.match(/\)/g) || []).length;
      if (closes <= opens) {
        break;
      }
      trailing = ")" + trailing;
      url = url.slice(0, -1);
    }

    return { url: url, trailing: trailing };
  }

  function shouldSkip(node) {
    for (var el = node.parentElement; el; el = el.parentElement) {
      if (skipTags.has(el.tagName)) {
        return true;
      }
    }
    return false;
  }

  containers.forEach(function (container) {
    var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
    var textNodes = [];
    var current;

    while ((current = walker.nextNode())) {
      if (!current.nodeValue || !urlPattern.test(current.nodeValue) || shouldSkip(current)) {
        urlPattern.lastIndex = 0;
        continue;
      }
      urlPattern.lastIndex = 0;
      textNodes.push(current);
    }

    textNodes.forEach(function (node) {
      var text = node.nodeValue;
      var fragment = document.createDocumentFragment();
      var lastIndex = 0;
      var match;

      urlPattern.lastIndex = 0;
      while ((match = urlPattern.exec(text)) !== null) {
        var trimmed = trimUrl(match[0]);
        var start = match.index;

        if (start > lastIndex) {
          fragment.appendChild(document.createTextNode(text.slice(lastIndex, start)));
        }

        var link = document.createElement("a");
        link.href = trimmed.url;
        link.textContent = trimmed.url;
        fragment.appendChild(link);

        if (trimmed.trailing) {
          fragment.appendChild(document.createTextNode(trimmed.trailing));
        }

        lastIndex = match.index + match[0].length;
      }

      if (lastIndex === 0) {
        return;
      }

      if (lastIndex < text.length) {
        fragment.appendChild(document.createTextNode(text.slice(lastIndex)));
      }

      node.parentNode.replaceChild(fragment, node);
    });
  });
});
</script>
